services:
  # ═══════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: construction_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d construction_erp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════
  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - auth-service
      - user-service
      - company-service
      - staff-service
      - project-service
      - attendance-service
      - finance-service
      - payroll-service
      - procurement-service
      - inventory-service
      - vehicle-service
      - sales-service
      - notification-service
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # MICROSERVICES
  # ═══════════════════════════════════════════
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    environment:
      - SERVICE_PORT=5001
      - WORKERS=2
      - DATABASE_URL=postgresql://erp_user:erp_password@db:5432/construction_erp
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=construction-erp-secret-key-2026
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  user-service:
